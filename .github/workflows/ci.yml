name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mathuloire_test_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql
          tools: composer

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install JS dependencies
        run: npm ci

      - name: PHP Lint
        run: vendor/bin/parallel-lint src/ --exclude vendor

      - name: PHPStan
        run: vendor/bin/phpstan analyse

      - name: ESLint
        run: npx eslint assets/

      - name: Build assets
        run: npm run build

      - name: Create test database
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/mathuloire_test?serverVersion=8.0"
        run: |
          php bin/console doctrine:schema:create --env=test
          php bin/console doctrine:fixtures:load --env=test -n

      - name: PHPUnit
        env:
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/mathuloire_test?serverVersion=8.0"
          MAILER_DSN: "null://null"
          MAILER_FROM: "test@test.com"
          HELLOASSO_CLIENT_ID: "test"
          HELLOASSO_CLIENT_SECRET: "test"
          HELLOASSO_ORGANIZATION_SLUG: "test"
          HELLOASSO_IS_SANDBOX: "true"
          HELLOASSO_WEBHOOK_SECRET: "test_webhook_secret"
          APP_BASE_URL: "https://test.local"
          APP_SECRET: "test_secret"
          TRUSTED_PROXIES: ""
        run: vendor/bin/phpunit
